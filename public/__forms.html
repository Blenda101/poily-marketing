<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form registration</title>
  </head>
  <body>
    <!--
      Static form so Netlify detects "waitlist" at build time.
      The real UI lives in src/components/WaitlistForm.tsx, which POSTs here.
    -->
    <form name="waitlist" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="waitlist" />
      <input type="text" name="bot-field" />
      <input type="email" name="email" />
      <input type="text" name="source" />
    </form>
  </body>
</html>
